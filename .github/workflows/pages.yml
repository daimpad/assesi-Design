name: Handbuch zu GitHub Pages

# Veröffentlicht das CI-Handbuch (handbook.html + die echten Token-/Komponenten-/
# Font-Assets) als statische Seite. Keine Kopien im Repo, kein Drift: die Dateien
# werden beim Build aus der Quelle zusammengestellt.

on:
  push:
    branches: [master]
    paths:
      - 'theme/assesi-child/handbook.html'
      - 'theme/assesi-child/assets/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Seite zusammenstellen
        run: |
          mkdir -p _site
          # Handbuch wird die Startseite der Pages-Site
          cp theme/assesi-child/handbook.html _site/index.html
          # Assets unter ./assets/ — die relativen Pfade im Handbuch lösen so auf
          cp -r theme/assesi-child/assets _site/assets
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
